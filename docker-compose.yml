services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mesupport
      POSTGRES_USER: mesupport
      POSTGRES_PASSWORD: mesupport
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mesupport
      DB_USER: mesupport
      DB_PASSWORD: mesupport
      JWT_SECRET: VGhpc0lzQVN1ZmZpY2llbnRseUxvbmdCYXNlNjRTZWNyZXRLZXlGb3JKV1Q=
    ports:
      - "8080:8080"

volumes:
  pgdata:
